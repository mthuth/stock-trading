name: Quality

on:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Local quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare quality gate cache
        run: |
          sudo mkdir -p /private/tmp/stock-pycache
          sudo chown -R "$USER" /private/tmp/stock-pycache

      - name: Run quality gate
        run: python3 scripts/check_quality.py
